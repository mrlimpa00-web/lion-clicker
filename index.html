<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦁 ЦАРЬ КЛИКЕР</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 16px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .balance {
            display: flex;
            flex-direction: column;
        }
        .balance-label {
            font-size: 12px;
            color: #ffd700;
        }
        .balance-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        .level {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            padding: 10px 18px;
            border-radius: 30px;
            color: #1a1a2e;
            font-weight: bold;
        }
        .lion-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            cursor: pointer;
        }
        .lion {
            font-size: 220px;
            transition: transform 0.1s;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.5));
            animation: float 3s ease-in-out infinite;
        }
        .lion:active {
            transform: scale(0.9);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .energy-container {
            margin: 20px 0;
        }
        .energy-text {
            display: flex;
            justify-content: space-between;
            color: #ffd700;
            margin-bottom: 8px;
        }
        .energy-bar-bg {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            height: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .energy-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            border-radius: 30px;
            transition: width 0.3s;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        .stat-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .menu-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
        }
        .menu-item:active {
            background: rgba(255, 215, 0, 0.2);
        }
        .menu-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .menu-text {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 12px 20px;
            margin: 10px 0;
            cursor: pointer;
            text-align: center;
            display: inline-block;
            color: #ffd700;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ffd700;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            color: white;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            border-color: #4CAF50;
        }
        .toast.error {
            border-color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="balance">
                <span class="balance-label">🪙 МОНЕТЫ</span>
                <span class="balance-value" id="balance">0</span>
            </div>
            <div class="level" id="levelInfo">👑 УРОВЕНЬ 1</div>
        </div>

        <div id="mainSection" class="section active">
            <div class="lion-container" id="lionBtn">
                <div class="lion">🦁</div>
            </div>

            <div class="energy-container">
                <div class="energy-text">
                    <span>⚡ ЭНЕРГИЯ</span>
                    <span id="energyDisplay">100/100</span>
                </div>
                <div class="energy-bar-bg">
                    <div class="energy-bar-fill" id="energyBar" style="width: 100%"></div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">👆</div>
                    <div class="stat-label">КЛИКОВ</div>
                    <div class="stat-value" id="clicks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-label">СИЛА</div>
                    <div class="stat-value" id="clickPower">1</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💥</div>
                    <div class="stat-label">КРИТ</div>
                    <div class="stat-value" id="critChance">5%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✨</div>
                    <div class="stat-label">БУСТЫ</div>
                    <div class="stat-value" id="activeBoosts">0</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let userData = {
            coins: 0,
            clicks: 0,
            click_power: 1,
            energy: 100,
            max_energy: 100,
            critical_chance: 5,
            active_upgrades: 0
        };

        // Функция обновления UI
        function updateUI() {
            document.getElementById('balance').textContent = userData.coins;
            document.getElementById('clicks').textContent = userData.clicks;
            document.getElementById('clickPower').textContent = userData.click_power;
            document.getElementById('critChance').textContent = userData.critical_chance + '%';
            document.getElementById('activeBoosts').textContent = userData.active_upgrades;
            document.getElementById('energyDisplay').textContent = `${userData.energy}/${userData.max_energy}`;
            document.getElementById('energyBar').style.width = (userData.energy / userData.max_energy * 100) + '%';
            
            let level = Math.floor(userData.click_power / 2) + 1;
            document.getElementById('levelInfo').textContent = `👑 УРОВЕНЬ ${level}`;
        }

        // Запрос данных
        function loadData() {
            console.log('📤 Запрашиваем данные...');
            tg.sendData(JSON.stringify({ action: 'get_user_data' }));
        }

        // Обработка ответа
        tg.onEvent('webAppData', function(data) {
            console.log('📥 Получен ответ:', data);
            try {
                const response = JSON.parse(data);
                console.log('✅ Распарсили:', response);
                
                if (response.coins !== undefined) {
                    userData = response;
                    updateUI();
                    showToast('✅ Данные загружены', 'success');
                }
            } catch(e) {
                console.log('❌ Ошибка:', e);
            }
        });

        // Клик
        document.getElementById('lionBtn').addEventListener('click', function() {
            if (userData.energy <= 0) {
                showToast('⚡ НЕТ ЭНЕРГИИ!', 'error');
                return;
            }
            
            document.querySelector('.lion').style.transform = 'scale(0.8)';
            setTimeout(() => document.querySelector('.lion').style.transform = 'scale(1)', 100);
            
            userData.energy--;
            userData.coins += userData.click_power;
            userData.clicks++;
            updateUI();
            
            showToast(`+${userData.click_power} монет`, 'success');
        });

        function showToast(msg, type) {
            let toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Восстановление энергии
        setInterval(() => {
            if (userData.energy < userData.max_energy) {
                userData.energy++;
                updateUI();
            }
        }, 60000);

        // Загружаем данные
        setTimeout(loadData, 1000);
    </script>
</body>
</html>
